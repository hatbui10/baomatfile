<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>MATRIX V11 - ULTRA PERSISTENT</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Consolas', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding-top: 20px;
        }
        .container {
            width: 95%;
            max-width: 500px;
            background-color: #111;
            padding: 20px;
            border: 1px solid #00ff41;
            border-radius: 8px;
        }
        .input-group { margin-bottom: 12px; }
        label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; text-transform: uppercase; }
        input {
            width: 100%; padding: 12px; background: #000; border: 1px solid #333;
            color: #ffd600; border-radius: 4px; box-sizing: border-box; font-size: 16px;
        }
        .row-flex { display: flex; gap: 8px; }
        .row-flex input { flex: 3; }
        .row-flex button { 
            flex: 1; background-color: #ffd600; color: #000; 
            border: none; border-radius: 4px; font-weight: bold; cursor: pointer;
        }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .main-btn {
            flex: 1; padding: 15px; cursor: pointer; font-weight: bold;
            border: none; border-radius: 4px; text-transform: uppercase; color: white;
        }
        #btnA { background-color: #1b5e20; }
        #btnB { background-color: #b71c1c; }
        #resultArea {
            margin-top: 25px; display: flex; flex-direction: column; gap: 8px; width: 100%;
        }
        .num-row {
            padding: 15px; text-align: center; background-color: #1a1a1a;
            border: 1px solid #222; border-radius: 4px; font-size: 26px;
            letter-spacing: 4px; color: #ffd600;
        }
        .hidden { display: none !important; }
        #btnClear { background: none; border: 1px solid #333; color: #444; width: 100%; margin-top: 30px; cursor: pointer; padding: 5px; font-size: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:#00ff41; margin-top:0;">MATRIX V11</h2>
    
    <div class="input-group">
        <label>Độ dài (n):</label>
        <input type="number" id="lengthInput" value="5">
    </div>

    <div class="input-group">
        <label>2 số cuối & Lọc:</label>
        <div class="row-flex">
            <input type="text" id="suffixInput" maxlength="2" placeholder="VD: 88">
            <button onclick="applyFilter()">LỌC</button>
        </div>
    </div>

    <div class="input-group">
        <label>File dữ liệu:</label>
        <input type="file" id="fileUpload" accept=".txt">
    </div>

    <div class="btn-group">
        <button id="btnA" class="main-btn" onclick="process(true)">Nút A (≥ 5)</button>
        <button id="btnB" class="main-btn" onclick="process(false)">Nút B (< 5)</button>
    </div>
    
    <div id="resultArea"></div>
    <button id="btnClear" onclick="clearData()">XÓA BỘ NHỚ LOCAL</button>
</div>

<script>
    const STORAGE_KEY = 'MATRIX_FINAL_SAVE_V11';

    // KHÔI PHỤC NGAY LẬP TỨC KHI LOAD TRANG
    document.addEventListener('DOMContentLoaded', () => {
        const savedData = localStorage.getItem(STORAGE_KEY);
        if (savedData) {
            document.getElementById('resultArea').innerHTML = savedData;
            console.log("Đã khôi phục dữ liệu từ Local Storage.");
        }
    });

    function process(isGreaterMode) {
        const n = parseInt(document.getElementById('lengthInput').value) || 5;
        const fileInput = document.getElementById('fileUpload');
        const resultArea = document.getElementById('resultArea');

        if (!fileInput.files[0]) return alert("Hãy chọn file!");

        const reader = new FileReader();
        reader.onload = function(e) {
            const allDigits = e.target.result.replace(/\D/g, ''); 
            let htmlContent = '';
            let currentSeq = "";

            for (let i = 0; i < allDigits.length; i++) {
                const d = parseInt(allDigits[i]);
                let valid = isGreaterMode ? (d >= 5) : (d < 5);

                if (valid) {
                    currentSeq += allDigits[i];
                    if (currentSeq.length === n) {
                        htmlContent += `<div class="num-row">${currentSeq}</div>`;
                        currentSeq = "";
                    }
                } else {
                    currentSeq = ""; 
                }
            }
            resultArea.innerHTML = htmlContent;
            saveLocal();
        };
        reader.readAsText(fileInput.files[0]);
    }

    function applyFilter() {
        const suffix = document.getElementById('suffixInput').value;
        const rows = document.querySelectorAll('.num-row');
        if (!suffix) return alert("Nhập số đuôi!");

        rows.forEach(row => {
            if (row.innerText.trim().endsWith(suffix)) {
                row.classList.remove('hidden');
            } else {
                row.classList.add('hidden');
            }
        });
        saveLocal();
    }

    function saveLocal() {
        const area = document.getElementById('resultArea');
        // Lưu toàn bộ nội dung HTML bao gồm cả các class "hidden"
        localStorage.setItem(STORAGE_KEY, area.innerHTML);
    }

    function clearData() {
        if(confirm("Xóa vĩnh viễn?")) {
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById('resultArea').innerHTML = '';
        }
    }
</script>
</body>
</html>
